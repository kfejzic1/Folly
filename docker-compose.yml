services:
  ollama:
    image: docker.io/ollama/ollama
    networks:
      - folly-net
    volumes:
      - ollama_data:/root/.ollama
    devices:
      - nvidia.com/gpu=all

  ollama-pull:
    image: docker.io/ollama/ollama
    networks:
      - folly-net
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until ollama list 2>/dev/null; do
          echo 'Waiting for Ollama to be ready...'
          sleep 2
        done
        ollama pull ${OLLAMA_MODEL:-llama3.1}
        echo 'Model pulled successfully.'

  folly-api:
    build: .
    networks:
      - folly-net
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for model ${OLLAMA_MODEL:-llama3.1} to be available..."
        until python3 -c "
        import urllib.request, json, sys
        try:
            resp = urllib.request.urlopen('http://ollama:11434/api/tags')
            data = json.loads(resp.read())
            models = [m['name'] for m in data.get('models', [])]
            sys.exit(0 if any('${OLLAMA_MODEL:-llama3.1}' in name for name in models) else 1)
        except Exception:
            sys.exit(1)
        " 2>/dev/null; do
          sleep 3
        done
        echo "Model ready, starting API..."
        exec folly-api http://ollama:11434/v1 \
          --model "${OLLAMA_MODEL:-llama3.1}" \
          example_challenges/example_config.json \
          --port 5000

  folly-ui:
    build: .
    networks:
      - folly-net
    command: >
      folly-ui http://folly-api:5000
      --port 5001
      --no-browser
    ports:
      - "5001:5001"

networks:
  folly-net:

volumes:
  ollama_data:
